name: Add to project
on:
  workflow_call:
    inputs:
      project-url:
        type: string
        required: false
        description: "GitHub Project URL"
        default: "https://github.com/orgs/RubberDuckCrew/projects/1"
      bot-app-id:
        type: string
        required: true
        description: "The ID of the GitHub App, used for authentication."
    secrets:
      BOT_APP_PRIVATE_KEY:
        description: "The private key for the GitHub App, used for authentication."
        required: true

jobs:
  add-to-project:
    name: Add issue to project
    runs-on: ubuntu-latest
    steps:
      - name: Check if secrets are available
        id: check-secrets
        run: |
          echo "secrets_available=${{ inputs.bot-app-id && secrets.BOT_APP_PRIVATE_KEY && 'true' || '' }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: ${{ steps.check-secrets.outputs.secrets_available }}
        id: app-token
        with:
          app-id: ${{ inputs.bot-app-id }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Add to project
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        if: ${{ steps.app-token.outputs.token }}
        with:
          project-url: ${{ inputs.project-url }}
          github-token: ${{ steps.app-token.outputs.token }}
