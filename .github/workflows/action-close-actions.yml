name: Close Actions

on:
  workflow_call:

jobs:
  close:
    name: Close issue or pull request
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Remove labels
        uses: IamPekka058/removeLabels@82c8d070189f04448d6ffe291a0e398c2a749a09 # v2
        with:
          github_token: ${{ github.token }}
          labels: "🚧 Work in Progress"

  close-pr:
    name: Close pull request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      actions: write

    steps:
      - name: Delete branch caches
        uses: Friedinger/DeleteBranchCaches@6482cbb941b3c4c7766dfcaf6db69c610b1af3ce # v2.4.2
        with:
          github-token: ${{ github.token }}
          ref: "refs/pull/${{ github.event.pull_request.number }}/merge"
