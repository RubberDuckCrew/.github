name: Add to project

on:
  issues:
    types: [opened]

jobs:
  run:
    # uses: RubberDuckCrew/.github/.github/workflows/action-add-project.yml@main
    uses: ./.github/workflows/action-add-project.yml
    with:
      bot-app-id: ${{ vars.RUBBERDUCKCREW_BOT_APP_ID }}
    secrets:
      BOT_APP_PRIVATE_KEY: ${{ secrets.RUBBERDUCKCREW_BOT_APP_PRIVATE_KEY }}
